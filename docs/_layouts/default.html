<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
{% include head.html %}
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<script>
  (function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>
</head>
<body>
<div class="page">
  {% include nav.html %}

  <section class="content">
    {{ content }}
  </section>

  {% include footer.html %}
</div>

<script>
  (function() {
    var toggle = document.getElementById('darkToggle');
    if (!toggle) return;
    // 初始状态
    var root = document.documentElement;
    toggle.textContent = root.classList.contains('dark') ? '🌙' : '☀️';
    // 点击切换
    toggle.addEventListener('click', function() {
      var isDark = root.classList.toggle('dark');
      root.classList.remove('light');
      if (!isDark) root.classList.add('light');
      toggle.textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  })();
</script>
</body>
</html>
